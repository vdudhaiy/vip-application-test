services:
  backend:
    build: ./backend
    container_name: django_backend
    env_file: .env
    ports:
      - "8080:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    ports:
      - "5432:5432"   # optional

volumes:
  postgres_data:
